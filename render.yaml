services:
  - type: web
    name: carbon-footprint-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: http://localhost:5173
      - key: DATABASE_URL
        value: sqlite:///./carbon_app.db
